<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coloring Book Generator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Coloring Book Generator</h1>
    <form id="generatorForm">

        <div class="input-group">
            <label>Theme</label>
            <input
                type="text"
                id="theme"
                placeholder="Example: Dinosaurs"
                required>
        </div>

        <div class="input-group">
            <label>Child Age</label>
            <input
                type="number"
                id="age"
                min="2"
                max="12"
                value="5"
                required>
        </div>

        <div class="input-group">
            <label>Number of Pages</label>
            <input
                type="number"
                id="pages"
                min="1"
                max="20"
                value="5"
                required>
        </div>

        <button type="submit">
            Generate Coloring Book
        </button>

    </form>

    <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p>Generating your coloring book...</p>
    </div>

    <div id="status"></div>

</div>

<script src="script.js"></script>

</body>
</html>
